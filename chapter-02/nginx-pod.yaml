kind: Pod
apiVersion: v1
metadata:
  name: nginx
spec:
  restartPolicy: Always
  volumes:
    - name: data
      emptyDir: {}
  initContainers:
  - name: nginx-init
    image: alpine:3.19.2
    command: 
      - sh
      - -c
      - |
        cat > /data/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head><title>Kubernetes Demo</title></head>
        <body>
          <h1>Hello from Kubernetes! 🚀</h1>
          <p>Init Container: Alpine 3.19.2</p>
          <p>Web Server: Nginx</p>
        </body>
        </html>
        EOF
    volumeMounts:
    - name: data
      mountPath: /data
  containers:
  - name: nginx
    image: nginx:1.31.1-alpine3.23          # ✅ Version mới, lightweight
    volumeMounts:
    - name: data
      mountPath: /usr/share/nginx/html
    ports:
    - containerPort: 80
