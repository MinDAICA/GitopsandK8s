apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-slave
  labels:
    app: redis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
      role: slave
      tier: backend
  template:
    metadata:
      labels:
        app: redis
        role: slave
        tier: backend
    spec:
      containers:
      - name: redis-slave             # <--- Đổi tên container
        image: redis:6.0.5            # <--- Image mới (Redis 6.0.5) ✅
        command: ["redis-server"]     # <--- Thêm command
        args: ["--slaveof", "redis-master", "6379"]  # <--- Thêm args
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
