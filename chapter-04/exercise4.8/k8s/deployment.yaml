apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
      - name: guestbook
        image: guestbook:1.0.0
        imagePullPolicy: Never   # ← Thêm dòng này
        ports:
        - containerPort: 8080
        env:
        - name: DARK_MODE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: guestbook-config
              key: DARK_MODE_ENABLED
